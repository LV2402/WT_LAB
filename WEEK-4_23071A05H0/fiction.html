<!DOCTYPE html>
<html>
<head>
    <title>Fiction Books</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="frame">
        <h1>Fiction Books</h1>
        <div class="book">
            <h2>The Great Gatsby</h2>
            <p>Author: F. Scott Fitzgerald</p>
            <p>Price: $12.99</p>
            <p>Description: A classic novel about the American Dream.</p>
            <button onclick="addToCart('The Great Gatsby', 'F. Scott Fitzgerald', 12.99)">Add to Cart</button>
        </div>
        <div class="book">
            <h2>To Kill a Mockingbird</h2>
            <p>Author: Harper Lee</p>
            <p>Price: $14.99</p>
            <p>Description: A powerful story of racial injustice.</p>
            <button onclick="addToCart('To Kill a Mockingbird', 'Harper Lee', 14.99)">Add to Cart</button>
        </div>
    </div>
<script src="scripts.js"></script>
</body>
</html>
