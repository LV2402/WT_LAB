<!DOCTYPE html>
<html>
<head>
    <title>Bestsellers</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="frame">
        <h1>Bestsellers</h1>
        <div class="book">
            <h2>The Midnight Library</h2>
            <p>Author: Matt Haig</p>
            <p>Price: $15.99</p>
            <p>Description: A novel about life's infinite possibilities.</p>
            <button onclick="addToCart('The Midnight Library', 'Matt Haig', 15.99)">Add to Cart</button>
        </div>
        <div class="book">
            <h2>Atomic Habits</h2>
            <p>Author: James Clear</p>
            <p>Price: $17.99</p>
            <p>Description: A guide to building good habits.</p>
            <button onclick="addToCart('Atomic Habits', 'James Clear', 17.99)">Add to Cart</button>
        </div>
    </div>
<script src="scripts.js"></script>
</body>
</html>
