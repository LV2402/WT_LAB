<!DOCTYPE html>
<html>
<head>
    <title>Book Details</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="frame">
        <h1>Welcome to Our Online Bookstore</h1>
        <p>Explore our collection of books. Use the navigation to browse categories.</p>
        <hr>
        <h2>User Registration</h2>
        <form onsubmit="return validateRegistrationForm();">
            <label for="reg-username">Username:</label>
            <input type="text" id="reg-username" name="reg-username" required><br>
            <label for="reg-password">Password:</label>
            <input type="password" id="reg-password" name="reg-password" required><br>
            <label for="reg-confirm-password">Confirm Password:</label>
            <input type="password" id="reg-confirm-password" name="reg-confirm-password" required><br>
            <button type="submit">Register</button>
        </form>
        <hr>
        <h2>Forgot Password</h2>
        <form onsubmit="return validateForgotPasswordForm();">
            <label for="forgot-email">Email Address:</label>
            <input type="email" id="forgot-email" name="forgot-email" required><br>
            <button type="submit">Reset Password</button>
        </form>
    </div>
</body>
</html>
<script src="scripts.js"></script>
</html>
