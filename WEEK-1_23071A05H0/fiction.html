<!DOCTYPE html>
<html>
<head>
    <title>Fiction Books</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #333; }
        .book { margin-bottom: 20px; border: 1px solid #ddd; padding: 10px; }
        .book h2 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>Fiction Books</h1>
    <div class="book">
        <h2>The Great Gatsby</h2>
        <p>Author: F. Scott Fitzgerald</p>
        <p>Price: $12.99</p>
        <p>Description: A classic novel about the American Dream.</p>
    </div>
    <div class="book">
        <h2>To Kill a Mockingbird</h2>
        <p>Author: Harper Lee</p>
        <p>Price: $14.99</p>
        <p>Description: A powerful story of racial injustice.</p>
    </div>
</body>
</html>
