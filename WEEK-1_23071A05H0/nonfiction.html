<!DOCTYPE html>
<html>
<head>
    <title>Non-Fiction Books</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #333; }
        .book { margin-bottom: 20px; border: 1px solid #ddd; padding: 10px; }
        .book h2 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>Non-Fiction Books</h1>
    <div class="book">
        <h2>Sapiens: A Brief History of Humankind</h2>
        <p>Author: Yuval Noah Harari</p>
        <p>Price: $18.99</p>
        <p>Description: An exploration of human history.</p>
    </div>
    <div class="book">
        <h2>Thinking, Fast and Slow</h2>
        <p>Author: Daniel Kahneman</p>
        <p>Price: $16.99</p>
        <p>Description: Insights into human decision-making.</p>
    </div>

</html>
